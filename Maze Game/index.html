<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Maze Game</title>
    </head>
    <body>
        <div id="inventory">
            <div class="container" id="keys-container">
                <img class="key" src="images/keys/blue_key.png" alt="blue_key.png">
                <img class="key" src="images/keys/blue_key.png" alt="blue_key.png">
                <img class="key" src="images/keys/empty_key.png" alt="blue_key.png">
            </div>
            <div class="container" id="cards-container">
                <img class="card" src="images/cards/red_heart_card.png" alt="blue_key.png">
                <img class="card" src="images/cards/empty_card.png" alt="blue_key.png">
                <img class="card" src="images/cards/empty_card.png" alt="blue_key.png">
            </div>
        </div>
        <canvas id="canvas"></canvas>
        <script src="map.js"></script>
        <script src="script.js"></script>
    </body>
</html>
