<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="style.css">
        <title>CGOL</title>
    </head>
    <body>
        <div id="contents">
            <div id="settings">
                <button id="run-button">Run</button>
                <button id="step-button">Step</button>
                <button id="clear-button">Clear</button>
                <button id="randomize-button">Randomize</button>
                <div>
                    <span id="ups-number">Updates Per Second: 100</span>
                    <input type="range" min="1" max="60" id="ups-slider">
                </div>
                <div>
                    <span id="brush-size-number">Brush Size: 30</span>
                    <input type="range" min="1" max="10" id="brush-size-slider">
                </div>
                <p>
                    <u>Rules</u>
                    <ul>
                        <li>Any live cell with less than 2 neighbors dies</li>
                        <li>Any live cell with 2 or 3 neighbors lives on</li>
                        <li>Any live cell with more than 3 neighbors dies</li>
                        <li>Any dead cell with exactly 3 neighbors becomes live</li>
                    </ul>
                </p>
            </div>
            <canvas id="canvas"></canvas>
        </div>
        <script src="script.js"></script>
    </body>
</html>
